name: Feed Hub Engine Demo Site

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  actions: read
  contents: read
  id-token: write
  pages: write

concurrency:
  group: rss-github-pages-publish
  cancel-in-progress: false

jobs:
  publish-pages:
    uses: ./.github/workflows/publish-pages.yml
    with:
      engine-repository: ${{ github.repository }}
      engine-ref: ${{ github.sha }}
      feeds-config-path: config/rss-feeds.json
      site-metadata-path: config/site-metadata.json
    secrets: inherit
