---
name: Publish Example Feed Hub

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  actions: read
  contents: read
  id-token: write
  pages: write

jobs:
  publish-pages:
    uses: mudman1986/feed-hub-engine/.github/workflows/publish-pages.yml@v2.0.0
    with:
      engine-repository: mudman1986/feed-hub-engine
      engine-ref: v2.0.0
      feeds-config-path: config/rss-feeds.json
      site-metadata-path: config/site-metadata.json
    secrets: inherit
